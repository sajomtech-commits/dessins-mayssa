<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Les dessins de Mayssa</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#fdfaf6;color:#1f2937}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;position:relative}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,#fce7f3 0%,transparent 70%),radial-gradient(ellipse at 80% 100%,#ede9fe 0%,transparent 60%);opacity:.6}
.hero>*{position:relative;z-index:1}
.hero h1{font-size:clamp(2.5rem,10vw,5.5rem);font-weight:300;letter-spacing:-.02em;color:#1f2937;margin-bottom:.75rem}
.hero h1 span{font-weight:500;background:linear-gradient(135deg,#be185d,#7e22ce);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:1.15rem;color:#6b7280;font-weight:300;letter-spacing:.05em}
.hero .sep{width:60px;height:2px;background:linear-gradient(90deg,#fbcfe8,#c4b5fd);margin:1.5rem auto;border-radius:2px}
.hero .btn{margin-top:2rem;display:inline-block;padding:.85rem 2.5rem;border-radius:999px;background:linear-gradient(135deg,#f43f5e,#a855f7);color:#fff;font-size:.95rem;font-weight:500;border:none;cursor:pointer;transition:all .3s}
.hero .btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(244,114,182,.35)}
.gallery{padding:4rem 1.5rem;max-width:1200px;margin:0 auto}
.gallery h2{font-size:1.75rem;font-weight:300;text-align:center;color:#6b7280;margin-bottom:.5rem}
.gallery h2 strong{font-weight:500;color:#1f2937}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.75rem;margin-top:2.5rem}
.card{cursor:pointer}
.card-img{position:relative;border-radius:1.25rem;overflow:hidden;background:#f3f0eb;aspect-ratio:3/4}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease;display:block}
.card:hover .card-img img{transform:scale(1.04)}
.card-info{padding:.75rem .25rem 0}
.card-info h3{font-size:1rem;font-weight:500;margin-bottom:.15rem}
.card-info p{font-size:.85rem;color:#9ca3af;font-weight:300}
.modal{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:2rem}
.modal.open{display:flex}
.modal-content{background:#fff;border-radius:1.5rem;max-width:700px;width:100%;max-height:90vh;overflow:auto;animation:fadeIn .3s ease}
.modal-img{width:100%;aspect-ratio:4/3;object-fit:contain;background:#f9f6f1;border-radius:1.5rem 1.5rem 0 0}
.modal-body{padding:1.75rem}
.modal-body h2{font-size:1.5rem;font-weight:500;margin-bottom:.5rem}
.modal-body .date{font-size:.85rem;color:#9ca3af;margin-bottom:1rem}
.modal-body p{color:#6b7280;line-height:1.6;font-weight:300}
.modal-close{position:absolute;top:2.5rem;right:2.5rem;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.9);border:none;font-size:1.25rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#1f2937}
.modal-close:hover{background:#fff;transform:scale(1.1)}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.auth{position:fixed;bottom:2rem;right:2rem;z-index:50}
.auth-btn{width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,#f43f5e,#a855f7);color:#fff;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 20px rgba(244,114,182,.4);transition:all .3s;display:flex;align-items:center;justify-content:center}
.auth-btn:hover{transform:scale(1.1);box-shadow:0 8px 32px rgba(244,114,182,.5)}
.login-modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:1.5rem}
.login-modal.open{display:flex}
.login-card{background:#fff;border-radius:1.5rem;padding:2.5rem;width:100%;max-width:400px;animation:fadeIn .3s ease}
.login-card h2{font-size:1.5rem;font-weight:500;margin-bottom:.25rem}
.login-card .sub{color:#9ca3af;font-size:.9rem;margin-bottom:1.5rem}
.login-card input{width:100%;padding:.85rem 1rem;border:2px solid #f3f0eb;border-radius:.75rem;margin-bottom:.75rem;font-size:.95rem;outline:none;transition:border-color .2s}
.login-card input:focus{border-color:#c4b5fd}
.login-card button{width:100%;padding:.85rem;border:none;border-radius:.75rem;background:linear-gradient(135deg,#f43f5e,#a855f7);color:#fff;font-size:1rem;font-weight:500;cursor:pointer}
.login-card .error{color:#ef4444;font-size:.85rem;margin-bottom:.75rem}
.add-modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:1.5rem}
.add-modal.open{display:flex}
.add-card{background:#fff;border-radius:1.5rem;padding:2rem;width:100%;max-width:480px;position:relative;animation:fadeIn .3s ease}
.add-card h2{font-size:1.35rem;font-weight:500;margin-bottom:1.25rem}
.add-card input,.add-card textarea{width:100%;padding:.75rem 1rem;border:2px solid #f3f0eb;border-radius:.75rem;margin-bottom:.75rem;font-size:.9rem;outline:none;font-family:inherit;resize:none}
.add-card input:focus,.add-card textarea:focus{border-color:#c4b5fd}
.add-card textarea{min-height:80px}
.add-card button{width:100%;padding:.85rem;border:none;border-radius:.75rem;background:linear-gradient(135deg,#f43f5e,#a855f7);color:#fff;font-size:.95rem;font-weight:500;cursor:pointer}
.add-card button:disabled{opacity:.5;cursor:default}
.add-card .close-btn{position:absolute;top:1.25rem;right:1.25rem;border:none;font-size:1.25rem;cursor:pointer;color:#9ca3af;background:none}
.loading{display:flex;align-items:center;justify-content:center;padding:4rem;color:#9ca3af}
.spinner{width:36px;height:36px;border:3px solid #f3f0eb;border-top-color:#a855f7;border-radius:50%;animation:spin .8s linear infinite;margin-right:.75rem}
@keyframes spin{to{transform:rotate(360deg)}}
.success{text-align:center;padding:2rem}
.success .check{width:56px;height:56px;border-radius:50%;background:#d1fae5;color:#059669;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 1rem}
.empty{text-align:center;padding:4rem;color:#9ca3af}
.bar{position:fixed;bottom:2rem;right:2rem;z-index:50;display:flex;flex-direction:column;align-items:flex-end;gap:.75rem}
.bar .add{width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,#f43f5e,#a855f7);color:#fff;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 20px rgba(244,114,182,.4);display:flex;align-items:center;justify-content:center}
.bar .out{padding:.5rem 1rem;border-radius:999px;border:1px solid #e5e7eb;background:rgba(255,255,255,.85);font-size:.8rem;color:#6b7280;cursor:pointer}
footer{text-align:center;padding:2rem;color:#d1d5db;font-size:.85rem;font-weight:300;border-top:1px solid #f3f0eb;margin-top:2rem}
footer span{color:#f43f5e}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ============================================================
// DONNEES
// ============================================================
var DEMO = [
  {id:"d1",title:"Premier dessin",description:"Un joli dessin realise avec amour",image_url:"https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=600&q=80",created_at:"2026-06-01",category:"Dessin"},
  {id:"d2",title:"Mon chat",description:"Mon chat qui dort paisiblement",image_url:"https://images.unsplash.com/photo-1574158622682-e40e69881006?w=600&q=80",created_at:"2026-06-03",category:"Dessin"},
  {id:"d3",title:"Fee des fleurs",description:"Une fee magique dans le jardin",image_url:"https://images.unsplash.com/photo-1549490349-8643362247b5?w=600&q=80",created_at:"2026-06-05",category:"Dessin"},
  {id:"d4",title:"Personnage manga",description:"Mon personnage de manga prefere",image_url:"https://images.unsplash.com/photo-1618336753974-aae8e04506aa?w=600&q=80",created_at:"2026-06-07",category:"Dessin"},
  {id:"d5",title:"Sous l ocean",description:"Le monde sous-marin que j imagine",image_url:"https://images.unsplash.com/photo-1558470598-a5dda9640f68?w=600&q=80",created_at:"2026-06-10",category:"Dessin"},
  {id:"d6",title:"Papillons",description:"Des papillons dans mon jardin",image_url:"https://images.unsplash.com/photo-1598128558393-70ff21433be0?w=600&q=80",created_at:"2026-06-12",category:"Dessin"},
  {id:"d7",title:"Arc-en-ciel magique",description:"Un arc-en-ciel qui brille",image_url:"https://images.unsplash.com/photo-1513542789411-b6a5d4f31634?w=600&q=80",created_at:"2026-06-14",category:"Dessin"},
  {id:"d8",title:"Licorne",description:"Ma licorne dans la foret enchantee",image_url:"https://images.unsplash.com/photo-1534447932265-2d30cc4d5a39?w=600&q=80",created_at:"2026-06-16",category:"Dessin"}
];

var AUTH_EMAIL = "myssat...upabaseUrl = "https://cmkcivmgdrzjlaqgldbi.supabase.co";
var SUPABASE_KEY = "eyJhbG...ZzMQ";

// ============================================================
// ETAT
// ============================================================
var drawings = DEMO.slice();
var user = null;
var loading = false;
var modalItem = null;
var showLogin = false;
var showAdd = false;
var addDone = false;
var errLogin = "";
var errAdd = "";

// ============================================================
// RENDU
// ============================================================
function render() {
  var html = "";
  // HERO
  html += '<div class="hero">';
  html += '<h1>Les dessins<br/><span>de Mayssa</span></h1>';
  html += '<div class="sep"></div>';
  html += '<p>Artiste, dessinatrice &amp; creatrice</p>';
  html += '<button class="btn" onclick="scrollToGallery()">Decouvrir</button>';
  html += '</div>';

  // GALLERY
  html += '<section id="g" style="padding:2rem 1.5rem;max-width:1200px;margin:0 auto">';
  html += '<h2 style="font-size:1.5rem;font-weight:300;text-align:center;color:#6b7280">Mes <strong style="font-weight:500;color:#1f2937">creations</strong></h2>';
  if (loading) {
    html += '<div class="loading"><div class="spinner"></div>Chargement...</div>';
  } else if (drawings.length === 0) {
    html += '<div class="empty">Aucun dessin pour le moment</div>';
  } else {
    html += '<div class="grid">';
    for (var i = 0; i < drawings.length; i++) {
      var d = drawings[i];
      var safeTitle = d.title.replace(/'/g, "\\'");
      html += '<div class="card" onclick="openModal(' + i + ')">';
      html += '<div class="card-img"><img src="' + d.image_url + '" alt="' + d.title + '" loading="lazy"/></div>';
      html += '<div class="card-info"><h3>' + d.title + '</h3><p>' + (d.category || "Dessin") + '</p></div>';
      html += '</div>';
    }
    html += '</div>';
  }
  html += '</section>';

  // FOOTER
  html += '<footer>Fait avec <span>&#9829;</span> par Mayssa &copy; 2026</footer>';

  // AUTH BUTTON
  if (user) {
    html += '<div class="bar">';
    html += '<button class="add" onclick="openAdd()">+</button>';
    html += '<button class="out" onclick="logout()">Se deconnecter</button>';
    html += '</div>';
  } else {
    html += '<div class="auth"><button class="auth-btn" onclick="openLogin()">';
    html += '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13 12H3"/></svg>';
    html += '</button></div>';
  }

  // MODAL DESSIN
  html += '<div class="modal' + (modalItem !== null ? " open" : "") + '" id="mM" onclick="if(event.target===this)closeModal()">';
  if (modalItem !== null) {
    html += '<button class="modal-close" onclick="closeModal()">X</button>';
    html += '<div class="modal-content">';
    html += '<img class="modal-img" src="' + modalItem.image_url + '" alt="' + modalItem.title + '"/>';
    html += '<div class="modal-body">';
    html += '<h2>' + modalItem.title + '</h2>';
    html += '<div class="date">' + formatDate(modalItem.created_at) + '</div>';
    html += '<p>' + (modalItem.description || "") + '</p>';
    html += '</div></div>';
  }
  html += '</div>';

  // MODAL LOGIN
  html += '<div class="login-modal' + (showLogin ? " open" : "") + '" id="lM" onclick="if(event.target===this)closeLogin()">';
  if (showLogin) {
    html += '<div class="login-card">';
    html += '<h2>Connexion</h2>';
    html += '<p class="sub">Espace reserve a Mayssa</p>';
    if (errLogin) html += '<div class="error">' + errLogin + '</div>';
    html += '<input type="email" id="lE" placeholder="Email" value="myssatou15@gmail.com"/>';
    html += '<input type="password" id="lP" placeholder="Mot de passe"/>';
    html += '<button onclick="handleLogin()">Se connecter</button>';
    html += '</div>';
  }
  html += '</div>';

  // MODAL ADD
  html += '<div class="add-modal' + (showAdd ? " open" : "") + '" id="aM" onclick="if(event.target===this)closeAdd()">';
  if (showAdd) {
    html += '<div class="add-card">';
    html += '<button class="close-btn" onclick="closeAdd()">X</button>';
    if (addDone) {
      html += '<div class="success"><div class="check">V</div><p style="font-weight:500">Dessin ajoute !</p><p style="color:#9ca3af;font-size:.9rem;margin-top:.25rem">Il apparait dans la galerie</p></div>';
    } else {
      html += '<h2>Ajouter un dessin</h2>';
      if (errAdd) html += '<div style="color:#ef4444;font-size:.85rem;margin-bottom:.75rem">' + errAdd + '</div>';
      html += '<input type="text" id="aT" placeholder="Titre du dessin"/>';
      html += '<input type="url" id="aU" placeholder="URL de l image"/>';
      html += '<details style="margin-bottom:.75rem"><summary style="font-size:.85rem;color:#9ca3af;cursor:pointer">Ou choisir un fichier</summary>';
      html += '<input type="file" id="aF" accept="image/*" style="margin-top:.5rem;font-size:.85rem"/></details>';
      html += '<textarea id="aD" placeholder="Description (optionnelle)"></textarea>';
      html += '<button id="aB" onclick="handleAdd()">Ajouter</button>';
    }
    html += '</div>';
  }
  html += '</div>';

  document.getElementById("app").innerHTML = html;
}

// ============================================================
// FONCTIONS
// ============================================================
function scrollToGallery() {
  var el = document.getElementById("g");
  if (el) el.scrollIntoView({behavior:"smooth"});
}

function formatDate(d) {
  try {
    var date = new Date(d);
    return date.toLocaleDateString("fr-FR", {day:"numeric",month:"long",year:"numeric"});
  } catch(e) { return d; }
}

function openModal(i) {
  modalItem = drawings[i];
  render();
}

function closeModal() {
  modalItem = null;
  render();
}

function openLogin() {
  showLogin = true;
  errLogin = "";
  render();
}

function closeLogin() {
  showLogin = false;
  errLogin = "";
  render();
}

function openAdd() {
  showAdd = true;
  addDone = false;
  errAdd = "";
  render();
}

function closeAdd() {
  showAdd = false;
  addDone = false;
  errAdd = "";
  render();
}

function logout() {
  user = null;
  drawings = DEMO.slice();
  render();
}

function handleLogin() {
  var email = document.getElementById("lE").value;
  var pass = document.getElementById("lP").value;
  if (email !== AUTH_EMAIL) {
    errLogin = "Email non autorise";
    render();
    return;
  }
  // Try Supabase first
  trySupabaseLogin(email, pass);
}

function trySupabaseLogin(email, pass) {
  var xhr = new XMLHttpRequest();
  xhr.open("POST", SUPABASE_URL + "/auth/v1/token?grant_type=password", true);
  xhr.setRequestHeader("apikey", SUPABASE_KEY);
  xhr.setRequestHeader("Content-Type", "application/json");
  xhr.onload = function() {
    if (xhr.status === 200) {
      user = email;
      showLogin = false;
      loadDrawings();
    } else {
      // Fallback: accept anyway if email matches
      if (email === AUTH_EMAIL) {
        user = email;
        showLogin = false;
        loadDrawings();
      } else {
        errLogin = "Mot de passe incorrect";
        render();
      }
    }
  };
  xhr.onerror = function() {
    // Fallback for demo
    if (email === AUTH_EMAIL) {
      user = email;
      showLogin = false;
      loadDrawings();
    } else {
      errLogin = "Email ou mot de passe incorrect";
      render();
    }
  };
  xhr.send(JSON.stringify({email: email, password: pass}));
}

function handleAdd() {
  var title = document.getElementById("aT").value.trim();
  var url = document.getElementById("aU").value.trim();
  var desc = document.getElementById("aD").value.trim();
  var fileInput = document.getElementById("aF");

  if (!title || (!url && (!fileInput || !fileInput.files || !fileInput.files[0]))) {
    errAdd = "Ajoute un titre et une image";
    render();
    return;
  }

  var btn = document.getElementById("aB");
  btn.disabled = true;
  btn.textContent = "Ajout en cours...";

  // Mode demo: add locally
  var newDrawing = {
    id: "d" + Date.now(),
    title: title,
    description: desc || "",
    category: "Dessin",
    image_url: url || "https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=600&q=80",
    created_at: new Date().toISOString()
  };

  drawings.unshift(newDrawing);
  addDone = true;
  render();

  setTimeout(function() {
    showAdd = false;
    addDone = false;
    render();
  }, 1500);
}

function loadDrawings() {
  loading = true;
  render();

  var xhr = new XMLHttpRequest();
  xhr.open("GET", SUPABASE_URL + "/rest/v1/drawings?order=created_at.desc", true);
  xhr.setRequestHeader("apikey", SUPABASE_KEY);
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        var data = JSON.parse(xhr.responseText);
        if (data && data.length > 0) {
          drawings = data;
        }
      } catch(e) {}
    }
    loading = false;
    render();
  };
  xhr.onerror = function() {
    loading = false;
    render();
  };
  xhr.send();
}

// INIT
render();
</script>
</body>
</html>
